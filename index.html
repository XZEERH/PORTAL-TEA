<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monolith EAC | Cyber-Neon Galaxy</title>
    <!-- Sci-Fi Font -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Cosmic Background Engine -->
    <div class="stars-bg"></div>

    <!-- 1. PRE-LOADER SYSTEM -->
    <div id="preloader" class="preloader-container">
        <img src="assets/favicon-tea.jpg" alt="Monolith Logo" class="rotating-logo">
        <div class="loader-ui">
            <div class="neon-progress-bar">
                <div id="progress-fill" class="progress-fill"></div>
            </div>
            <div class="loader-stats">
                <h2 id="loading-text" class="glitch-text">Loading Sistem...</h2>
                <h2 id="loading-percent" class="cyan-glow">0%</h2>
            </div>
        </div>
    </div>

    <!-- APP CONTAINER (Hidden until loaded) -->
    <main id="app" style="display: none;">
        <!-- Dynamic Content Injected Here via JS -->
    </main>

    <script src="app.js"></script>
</body>
</html>
