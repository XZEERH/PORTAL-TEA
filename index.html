<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEA PORTAL - The Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000;
            --accent-color: #00f3ff;
            --text-color: #ffffff;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border-color: rgba(255, 255, 255, 0.1);
            --secondary-text: #888;
            --font-size-base: 16px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Rajdhani', sans-serif; }
        body { 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            overflow-x: hidden; 
            min-height: 100vh;
            font-size: var(--font-size-base);
        }

        #starfield { position: fixed; inset: 0; z-index: -1; background: #000; }

        /* --- ANTI-FOUC WRAPPER --- */
        #app-container {
            opacity: 0;
            visibility: hidden;
            transition: opacity 1s ease, visibility 1s ease;
        }
        #app-container.loaded {
            opacity: 1;
            visibility: visible;
        }

        /* --- 1. INTRO PORTAL --- */
        #intro-portal {
            position: fixed; inset: 0; z-index: 2000; background: #000;
            display: flex; align-items: center; justify-content: center;
            text-align: center;
            transition: opacity 1s ease;
        }
        .intro-content { max-width: 600px; padding: 20px; }
        .intro-logo-sec { display: flex; flex-direction: column; align-items: center; gap: 15px; margin-bottom: 30px; }
        .intro-logo-sec img { width: 120px; height: 120px; filter: none; }
        .intro-logo-sec h1 { font-size: 80px; letter-spacing: 15px; line-height: 1; font-weight: 800; }
        .sub-title-intro { font-size: 16px; letter-spacing: 5px; color: var(--accent-color); margin-bottom: 40px; text-transform: uppercase; }
        .quote { font-style: italic; font-size: 18px; color: #ccc; margin-bottom: 30px; line-height: 1.6; }

        .rules-list { margin-bottom: 40px; display: inline-block; text-align: left; }
        .rule-item { font-size: 13px; color: #666; letter-spacing: 2px; margin-bottom: 8px; text-transform: uppercase; }

        .btn-masuk-portal {
            margin: 20px auto 0; width: 220px;
            text-transform: uppercase; letter-spacing: 5px; font-weight: 700; cursor: pointer;
            border: 1px solid var(--accent-color); padding: 15px; transition: 0.3s;
            background: transparent; color: var(--accent-color);
            display: block;
        }
        .btn-masuk-portal:hover { background: var(--accent-color); color: #000; }

        /* --- 2. LOADING SCREEN --- */
        #loading-screen {
            position: fixed; inset: 0; background: #000; z-index: 5000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.5s ease;
        }
        .loader-rotate { width: 150px; height: 150px; margin-bottom: 40px; animation: spin 4s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .progress-box { width: 260px; height: 2px; background: rgba(255,255,255,0.1); margin: 20px 0; }
        .progress-fill { width: 0%; height: 100%; background: var(--accent-color); transition: 0.1s; }

        /* --- 3. HEADER --- */
        header { 
            position: sticky; top: 0; z-index: 1000;
            padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; 
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
        }
        .header-brand { display: flex; align-items: center; gap: 15px; }
        .header-brand img { width: 32px; height: 32px; }
        .header-brand h2 { font-size: 24px; letter-spacing: 5px; font-weight: 700; }
        .settings-icon { width: 24px; height: 24px; cursor: pointer; fill: var(--secondary-text); }

        /* --- 4. MAIN HUB & CARDS --- */
        .container { padding: 40px 20px; max-width: 600px; margin: 0 auto; }
        .hero-section { text-align: center; margin-bottom: 60px; }
        .hero-section h1 { font-size: 60px; letter-spacing: 12px; font-weight: 800; }
        .hero-section p { font-size: 11px; color: var(--secondary-text); letter-spacing: 5px; margin-top: 15px; }

        .portal-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 35px;
            padding: 35px;
            margin-bottom: 25px;
            position: relative;
            cursor: pointer;
            transition: 0.4s;
            opacity: 0; transform: translateY(30px);
        }
        .portal-card.reveal { opacity: 1; transform: translateY(0); }
        .portal-card:hover { border-color: var(--accent-color); background: rgba(255,255,255,0.06); }

        .card-tag {
            position: absolute; top: 30px; right: 35px;
            border: 1px solid var(--border-color);
            padding: 5px 12px; border-radius: 20px;
            font-size: 9px; letter-spacing: 2px; color: var(--secondary-text);
        }

        .icon-container {
            width: 50px; height: 50px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 25px;
        }

        .portal-card h3 { font-size: 24px; letter-spacing: 3px; margin-bottom: 10px; }
        .portal-card .desc { font-size: 14px; color: var(--secondary-text); margin-bottom: 20px; }

        .btn-buka {
            display: flex; align-items: center; gap: 10px;
            font-size: 12px; font-weight: 700; letter-spacing: 2px;
        }

        /* --- SETTINGS --- */
        #settings-panel {
            position: fixed; top: 0; right: -100%; width: 90%; max-width: 380px;
            height: 100%; background: rgba(5,5,5,0.95); z-index: 4000; padding: 40px;
            transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            border-left: 1px solid var(--accent-color);
        }
        #settings-panel.active { right: 0; }
        .setting-row { display: flex; justify-content: space-between; padding: 20px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .system-pill-fixed {
            position: fixed; bottom: 30px; left: 30px; z-index: 900;
            background: rgba(0,0,0,0.6); border: 1px solid var(--border-color);
            padding: 8px 18px; border-radius: 30px; font-size: 11px; color: var(--accent-color);
            display: flex; align-items: center; gap: 8px;
        }
        .active-dot { width: 8px; height: 8px; background: var(--accent-color); border-radius: 50%; box-shadow: 0 0 8px var(--accent-color); }

        /* Footer diperterang dengan color: #888 */
        footer { text-align: center; padding: 60px 0 100px; font-size: 10px; letter-spacing: 5px; color: #888; } 
    </style>
</head>
<body>

    <canvas id="starfield"></canvas>

    <!-- 1. INTRO PORTAL -->
    <div id="intro-portal">
        <div class="intro-content">
            <div class="intro-logo-sec">
                <img src="assets/favicon-tea.jpg" alt="Logo" onerror="this.src='https://i.ibb.co/L5Mv1Ww/saturn-svgrepo-com.png'">
                <h1>TEA</h1>
            </div>
            <div class="sub-title-intro">The Editor of Astronomy Community</div>
            <div class="quote">"Menjelajahi cakrawala, menembus batas pengetahuan antariksa."</div>

            <div class="rules-list">
                <div class="rule-item">01. HORMATI SESAMA PENJELAJAH</div>
                <div class="rule-item">02. JAGA INTEGRITAS DATA ASTRONOMI</div>
                <div class="rule-item">03. BERBAGI PENGETAHUAN SECARA TERBUKA</div>
                <div class="rule-item">04. GUNAKAN SISTEM DENGAN BIJAK</div>
            </div>

            <div class="btn-masuk-portal" onclick="startSystem()">Masuk Portal</div>
        </div>
    </div>
